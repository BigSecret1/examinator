  description: Calculating posterior probability based on prior knowledge; widely used in statistical inference and decision-making.
  topic: Probability
  subject: Mathematics

- name: Random Variables and Probability Distributions
  description: Understanding Discrete and Continuous variables; focusing on Binomial and Poisson distributions.
  topic: Probability
  subject: Mathematics

