# Subject: History | Topic: Ancient
# This file contains the complete list of regional and thematic subtopics.

# History
# --- REGIONAL: ANCIENT INDIA ---
- name: Prehistoric India
  description: Paleolithic, Mesolithic, and Neolithic eras; early tool-making and the rock art of Bhimbetka.
  topic: ancient
  subject: history

- name: Indus Valley Civilization
  description: Harappan urban planning, drainage systems, trade with Mesopotamia, and the script of Mohenjo-Daro.
  topic: ancient
  subject: history

- name: Vedic Period
  description: Early and Later Vedic society, Rig Vedic hymns, the Varna system, and Upanishadic philosophy.
  topic: ancient
  subject: history

- name: Buddhism & Jainism
  description: Origins, core philosophies (Four Noble Truths, Ahimsa), major councils, and spread of these religions.
  topic: ancient
  subject: history

- name: The Mauryan Empire
  description: Chandragupta Maurya, Kautilya's Arthashastra, and Ashoka's Edicts on Dhamma.
  topic: ancient
  subject: history

- name: The Gupta Empire
  description: The Golden Age of India; advancements in Sanskrit literature, mathematics (Aryabhata), and metallurgy.
  topic: ancient
  subject: history

# --- REGIONAL: WESTERN & MIDDLE EASTERN ---
- name: Ancient Mesopotamia
  description: Sumerian city-states, the invention of Cuneiform, the Code of Hammurabi, and Ziggurat architecture.
  topic: ancient
  subject: history

- name: Ancient Egypt
  description: The Old, Middle, and New Kingdoms; Pharaohs, Hieroglyphics, Pyramids, and Egyptian Mythology.
  topic: ancient
  subject: history

- name: Ancient Greece
  description: The rise of the Polis (Athens/Sparta), Persian Wars, Classical Philosophy (Socrates, Plato), and the Olympics.
  topic: ancient
  subject: history

- name: Ancient Rome
  description: From the Roman Republic to the Empire; Roman Law, Engineering (Aqueducts), and the rise of Christianity.
  topic: ancient
  subject: history

# --- REGIONAL: EAST ASIA & AMERICAS ---
- name: Ancient China
  description: Early Dynasties (Shang, Zhou, Qin, Han); the Silk Road, Great Wall, and the Mandate of Heaven.
  topic: ancient
  subject: history

- name: Mesoamerican Civilizations
  description: The Olmec, Maya, and Aztec civilizations; achievements in astronomy, calendars, and stepped pyramids.
  topic: ancient
  subject: history

# --- THEMATIC: CROSS-CUTTING TOPICS ---
- name: Ancient World Economy
  description: Early trade routes (Silk Road, Incense Route), the evolution of coinage, and the barter system.
  topic: ancient
  subject: history

- name: Ancient Architecture & Art
  description: Comparative study of Temple styles, Stupas, Rock-cut caves, and the Seven Wonders of the Ancient World.
  topic: ancient
  subject: history

- name: Ancient Political Systems
  description: Transition from tribal chiefdoms to absolute monarchies and early forms of direct democracy.
  topic: ancient
  subject: history

- name: Science & Technology in Antiquity
  description: Ancient medicine (Ayurveda), astronomy, maritime technology, and early irrigation systems.
  topic: ancient
  subject: history

# --- REGIONAL: MEDIEVAL INDIA ---
- name: The Delhi Sultanate
  description: The rise of the Mamluk, Khilji, Tughlaq, Sayyid, and Lodi dynasties; administrative reforms and the introduction of Indo-Islamic architecture.
  topic: medieval
  subject: history

- name: The Mughal Empire
  description: From Babur’s conquest at Panipat to the zenith under Akbar and the eventual decline after Aurangzeb; focus on revenue systems (Zabt) and cultural synthesis.
  topic: medieval
  subject: history

- name: Bhakti and Sufi Movements
  description: The spread of devotional mysticism; the roles of figures like Kabir, Nanak, and Mirabai in challenging rigid social hierarchies.
  topic: medieval
  subject: history

- name: Southern Kingdoms (Vijayanagara and Bahmani)
  description: The grandeur of Hampi, the struggle for the Raichur Doab, and the unique administrative structures of the Deccan powers.
  topic: medieval
  subject: history

# --- REGIONAL: MODERN INDIA ---
- name: Advent of European Powers
  description: The arrival of the Portuguese, Dutch, French, and British; the transition of the East India Company from traders to administrative rulers.
  topic: modern
  subject: history

- name: The Great Revolt of 1857
  description: Causes, key leaders like Rani Lakshmibai and Mangal Pandey, and the subsequent shift from Company rule to the British Crown.
  topic: modern
  subject: history

- name: The Indian National Movement
  description: The formation of the INC, the Moderates vs. Extremists, and the emergence of Mahatma Gandhi’s philosophy of Satyagraha.
  topic: modern
  subject: history

- name: Road to Independence and Partition
  description: The Quit India Movement, the role of the INA, and the tragic complexities of the 1947 partition and integration of princely states.
  topic: modern
  subject: history

# --- GLOBAL: THE WORLD WARS ---
- name: World War I (The Great War)
  description: The assassination of Archduke Franz Ferdinand, trench warfare, the collapse of empires, and the Treaty of Versailles.
  topic: world wars
  subject: history

- name: The Interwar Period and Rise of Totalitarianism
  description: The Great Depression, the failure of the League of Nations, and the rise of Fascism in Italy and Nazism in Germany.
  topic: world wars
  subject: history

- name: World War II
  description: The invasion of Poland, the Holocaust, the Pacific Theater, and the technological shift marked by the use of atomic weapons.
  topic: world wars
  subject: history

- name: Post-War Reconstruction and the UN
  description: The formation of the United Nations, the start of the Cold War, and the global wave of decolonization.
  topic: world wars
  subject: history


#GST
# --- GST: BLOCKED ITC ---
- name: Section 17(5) - Motor Vehicles and Conveyances
  description: Blocked credit on passenger vehicles; exceptions for further supply, transportation of goods, or professional training.
  topic: Blocked Input Tax Credit (ITC)
  subject: Goods and Services Tax (GST)

- name: Food, Catering, and Personal Amenities
  description: Blocked ITC on outdoor catering, beauty treatment, and health services unless used for making an outward taxable supply of the same category.
  topic: Blocked Input Tax Credit (ITC)
  subject: Goods and Services Tax (GST)

- name: Works Contract and Immovable Property
  description: Rules regarding ITC for construction of immovable property (other than plant and machinery) on own account, even when used in business.
  topic: Blocked Input Tax Credit (ITC)
  subject: Goods and Services Tax (GST)

- name: Section 17(5)(h) - Free Samples and Gifts
  description: Treatment of ITC for goods lost, stolen, destroyed, written off, or disposed of by way of gift or free samples.
  topic: Blocked Input Tax Credit (ITC)
  subject: Goods and Services Tax (GST)

# --- GST: PLACE OF SUPPLY ---
- name: Section 10 - POS for Goods
  description: Determination of Place of Supply for goods other than imports/exports, covering movement, bill-to ship-to, and no-movement scenarios.
  topic: Place of Supply Rules
  subject: Goods and Services Tax (GST)

- name: Section 12 - POS for Services (Domestic)
  description: Determining POS where both supplier and recipient are in India; general rule vs. specific rules for immovable property and performance.
  topic: Place of Supply Rules
  subject: Goods and Services Tax (GST)

- name: Section 13 - POS for Services (International)
  description: Determining POS where either supplier or recipient is outside India; focus on performance-based services and intermediary services.
  topic: Place of Supply Rules
  subject: Goods and Services Tax (GST)

- name: POS for Passenger and Goods Transportation
  description: Specific rules for B2B vs. B2C supplies in the transportation sector, including mail and courier services.
  topic: Place of Supply Rules
  subject: Goods and Services Tax (GST)

