  description: Solving equations using the discriminant; properties of roots; introduction to the imaginary unit (i) and the Argand plane.
  topic: Algebra
  subject: Mathematics

- name: Sequences and Series
  description: Detailed study of Arithmetic (AP), Geometric (GP), and Harmonic Progressions (HP); finding the sum of n terms and infinite series.
  topic: Algebra
  subject: Mathematics

- name: Matrices and Determinants
  description: Operations on matrices, finding inverses, and using Cramer’s Rule to solve systems of linear equations.
  topic: Algebra
  subject: Mathematics

- name: Permutations and Combinations
  description: Fundamental principles of counting; calculating arrangements and selections; application of the Binomial Theorem.
  topic: Algebra
  subject: Mathematics

# --- MATHEMATICS: CALCULUS ---
- name: Limits, Continuity, and Differentiability
  description: Evaluating limits using L'Hôpital's Rule; defining continuity at a point and the derivative as a rate of change.
  topic: Calculus
  subject: Mathematics

- name: Application of Derivatives (AOD)
  description: Finding tangents and normals; determining maxima and minima of functions; Mean Value Theorems (Lagrange and Rolle).
  topic: Calculus
  subject: Mathematics

- name: Indefinite and Definite Integrals
  description: Techniques of integration (substitution, parts, partial fractions); using the Fundamental Theorem of Calculus to find area under curves.
  topic: Calculus
  subject: Mathematics

- name: Differential Equations
  description: Solving first-order ordinary differential equations (ODE) using variable separable, homogeneous, and linear methods.
  topic: Calculus
  subject: Mathematics

# --- MATHEMATICS: GEOMETRY ---
