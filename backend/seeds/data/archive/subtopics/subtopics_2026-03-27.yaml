# Physics
# --- PHYSICS: ELECTROMAGNETISM ---
- name: Electrostatics and Capacitance
  description: Study of electric charges at rest, Coulomb's law, electric fields, Gauss's theorem, and energy storage in parallel plate capacitors.
  topic: Electromagnetism
  subject: Physics

- name: Current Electricity
  description: Drift velocity, Ohm's law, electrical resistance, Kirchhoff's laws, and analysis of simple and complex circuits like the Wheatstone bridge.
  topic: Electromagnetism
  subject: Physics

- name: Magnetic Effects of Current and Magnetism
  description: Biot-Savart law, Ampere's circuital law, the Lorentz force on moving charges, and properties of dia, para, and ferromagnetic materials.
  topic: Electromagnetism
  subject: Physics

- name: Electromagnetic Induction and AC
  description: Faraday's laws, Lenz's law, self and mutual induction, and the analysis of alternating currents in LCR series circuits.
  topic: Electromagnetism
  subject: Physics

# --- PHYSICS: MECHANICS ---
- name: Kinematics and Laws of Motion
  description: Frame of reference, 1D and 2D motion (including projectiles), Newton's three laws of motion, and the dynamics of uniform circular motion and friction.
  topic: Mechanics
  subject: Physics

- name: Work, Energy, and Power
  description: The work-energy theorem, conservative and non-conservative forces, potential energy, and elastic vs. inelastic collisions in one and two dimensions.
  topic: Mechanics
  subject: Physics

- name: System of Particles and Rotational Motion
  description: Center of mass, moment of inertia for regular bodies, torque, angular momentum, and the kinematics of rotational motion.
  topic: Mechanics
  subject: Physics

- name: Gravitation
  description: The universal law of gravitation, Kepler's laws of planetary motion, acceleration due to gravity, escape velocity, and geostationary satellites.
  topic: Mechanics
  subject: Physics

# --- PHYSICS: OPTICS ---
- name: Ray Optics and Optical Instruments
  description: Reflection and refraction of light at plane and spherical surfaces, total internal reflection, lensmaker's formula, and magnification in microscopes and telescopes.
  topic: Optics
  subject: Physics

- name: Wave Optics
  description: Huygens principle, proof of reflection and refraction using wavefronts, Young's double-slit experiment for interference, and single-slit diffraction.
  topic: Optics
  subject: Physics

- name: Polarization of Light
  description: Plane polarized light, Brewster's law, and the uses of polaroids in controlling light intensity.
  topic: Optics
  subject: Physics

- name: Dispersion and Scattering
  description: Dispersion of light through a prism, scattering of light, and related natural phenomena like the blue color of the sky.
  topic: Optics
  subject: Physics

# --- PHYSICS: THERMODYNAMICS ---
- name: Thermal Properties of Matter
  description: Temperature scales, thermal expansion of solids, liquids, and gases, calorimetry, and the modes of heat transfer (conduction, convection, radiation).
  topic: Thermodynamics
  subject: Physics

- name: The Laws of Thermodynamics
  description: Zeroth law (thermal equilibrium), First law (internal energy and work), and the Second law (reversible and irreversible processes).
  topic: Thermodynamics
  subject: Physics

- name: Kinetic Theory of Gases
  description: Assumptions of ideal gases, concept of pressure, kinetic interpretation of temperature, degrees of freedom, and the law of equipartition of energy.
  topic: Thermodynamics
  subject: Physics

- name: Heat Engines and Refrigerators
  description: Analysis of the Carnot cycle, calculating the efficiency of heat engines, and determining the coefficient of performance for heat pumps.
  topic: Thermodynamics
  subject: Physics