  subject: Goods and Services Tax (GST)

- name: Health Care and Veterinary Services
  description: Exemptions for diagnosis, treatment, and care provided by clinical establishments and authorized medical practitioners.
  topic: Exemptions from GST
  subject: Goods and Services Tax (GST)

- name: Services of Goods Transport Agency (GTA)
  description: Specific exemptions for transport of agricultural produce, milk, salt, and relief materials by road.
  topic: Exemptions from GST
  subject: Goods and Services Tax (GST)

- name: Passenger Transportation Services
  description: Exemptions for public transport like Metro, Inland Waterways, and Non-AC stage carriages.
  topic: Exemptions from GST
  subject: Goods and Services Tax (GST)

- name: Services provided by Educational Institutions
  description: Services provided to students, faculty, and staff, as well as specific services provided to such institutions.
  topic: Exemptions from GST
  subject: Goods and Services Tax (GST)

- name: Pure Labour Contracts in Construction
  description: Exemptions for the construction of single residential units or projects under PMAY schemes.
