  description: Formulas for distance, section, and slope; standard and general equations of a circle and its tangents.
  topic: Geometry
  subject: Mathematics

- name: Conic Sections
  description: Exploring the properties, equations, and focal properties of the Parabola, Ellipse, and Hyperbola.
